# Render blueprint — deploy the app + a Postgres database in one click.
# On render.com: New > Blueprint > point at this repo. Render reads this file.
services:
  - type: web
    name: issue-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a random secret
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: issue-tracker-db
          property: connectionString

databases:
  - name: issue-tracker-db
    plan: free
