name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install commitizen

    - name: Create bump and changelog
      id: bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        cz bump --yes 2>&1 | tee bump_output.txt || true
        NEW_VERSION=$(cat VERSION 2>/dev/null || echo "")
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Push changes
      uses: ad-m/github-push-action@master
      if: steps.bump.outputs.new_version != ''
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ github.ref }}
        tags: true

    - name: Create GitHub Release
      if: steps.bump.outputs.new_version != '' && false
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          try {
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.bump.outputs.new_version }}',
              name: 'Release ${{ steps.bump.outputs.new_version }}',
              body: changelog,
              draft: false,
              prerelease: false,
            });
            console.log('Release created successfully');
          } catch (error) {
            if (error.status === 422) {
              console.log('Release already exists, skipping creation');
            } else {
              throw error;
            }
          }
